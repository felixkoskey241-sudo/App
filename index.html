<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Remote Control Dashboard</title>
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; }
    header { background: linear-gradient(135deg, #4caf50, #2196f3); color: #fff; padding: 2rem; text-align: center; }
    header h1 { margin: 0; font-size: 2.2rem; }
    header p { margin: 0.5rem 0 0; font-size: 1.1rem; }
    .container { padding: 2rem; max-width: 1000px; margin: auto; }
    section { margin-bottom: 2rem; }
    .card { background: #fff; padding: 1.5rem; margin-bottom: 1rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    button { margin-right: 0.5rem; padding: 0.6rem 1.2rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .ping { background: #4caf50; color: #fff; }
    .location { background: #2196f3; color: #fff; }
    .screenshot { background: #ff9800; color: #fff; }
    input { padding: 0.6rem; margin-right: 0.5rem; border: 1px solid #ccc; border-radius: 4px; }
    #notifFeed div { border-bottom: 1px solid #eee; padding: 0.5rem 0; }
    #welcome { text-align: center; margin-bottom: 2rem; }
    #welcome h2 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    #welcome p { color: #555; }
  </style>
</head>
<body>
  <header>
    <h1>📱 Remote Control Dashboard</h1>
    <p>Always‑online admin panel hosted on Vercel</p>
  </header>

  <div class="container">
    <!-- Smooth Welcome Section -->
    <section id="welcome" class="card">
      <h2>Welcome, Admin</h2>
      <p>Manage your devices, send commands, and view notifications in one place.</p>
    </section>

    <!-- Login -->
    <section class="card">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="text" id="email" placeholder="Admin Email" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </section>

    <!-- Devices -->
    <section class="card">
      <h2>Devices</h2>
      <div>
        <strong>Phone A</strong> (Online)
        <button class="ping" onclick="sendCommand('phoneA','ping')">Ping</button>
        <button class="location" onclick="sendCommand('phoneA','location')">Location</button>
        <button class="screenshot" onclick="sendCommand('phoneA','screenshot')">Screenshot</button>
      </div>
      <div style="margin-top:1rem;">
        <strong>Phone B</strong> (Offline)
        <button class="ping" onclick="sendCommand('phoneB','ping')">Ping</button>
        <button class="location" onclick="sendCommand('phoneB','location')">Location</button>
        <button class="screenshot" onclick="sendCommand('phoneB','screenshot')">Screenshot</button>
      </div>
    </section>

    <!-- Notifications -->
    <section class="card">
      <h2>Notifications</h2>
      <div id="notifFeed"></div>
    </section>
  </div>

  <!-- Firebase Web Push -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-messaging.js"></script>
  <script>
    // Replace with your Firebase config
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    // Request permission
    Notification.requestPermission().then((permission) => {
      if (permission === "granted") {
        messaging.getToken({ vapidKey: "YOUR_VAPID_KEY" }).then((currentToken) => {
          if (currentToken) {
            console.log("Device subscribed:", currentToken);
            // TODO: send token to your backend/dashboard
          }
        });
      }
    });

    // Listen for push messages
    messaging.onMessage((payload) => {
      const notifFeed = document.getElementById("notifFeed");
      const div = document.createElement("div");
      div.innerHTML = `<strong>${payload.notification.title}</strong>: ${payload.notification.body}`;
      notifFeed.prepend(div);
    });

    // Simulated commands
    function sendCommand(deviceId, command) {
      alert(`Sending ${command} to ${deviceId}`);
    }
  </script>
</body>
</html>
